<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Navbar */
.navbar {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* Products */
.products {
  padding: 20px;
  text-align: center;
}

.card {
  display: inline-block;
  width: 200px;
  margin: 15px;
  padding: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Cart */
.cart-box {
  padding: 20px;
  border-top: 2px solid #ccc;
}
</style>

</head>

<body>

<!-- 🔐 Login Check -->
<script>
if(!localStorage.getItem("login")){
  window.location.href = "login.html";
}
</script>

<!-- 🛒 Navbar -->
<div class="navbar">
  <div>🛒 My Shop</div>
  <div>
    Items: <span id="count">0</span>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- 🛍 Products -->
<div class="products">

  <div class="card">
    <h3>Shirt</h3>
    <p>$10</p>
    <button onclick="add('Shirt',10)">Add</button>
  </div>

  <div class="card">
    <h3>Shoes</h3>
    <p>$20</p>
    <button onclick="add('Shoes',20)">Add</button>
  </div>

</div>

<!-- 🛒 Cart -->
<div class="cart-box">
  <h2>Cart</h2>
  <ul id="cart"></ul>
  <h3>Total: $<span id="total">0</span></h3>
</div>

<script>
let count = 0;
let total = 0;

function add(name, price){
  count++;
  total += price;

  document.getElementById("count").innerText = count;
  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerHTML = name + " - $" + price + 
  " <button onclick='remove(this,"+price+")'>X</button>";

  document.getElementById("cart").appendChild(li);
}

function remove(btn, price){
  count--;
  total -= price;

  document.getElementById("count").innerText = count;
  document.getElementById("total").innerText = total;

  btn.parentElement.remove();
}

/* 🚪 Logout */
function logout(){
  localStorage.removeItem("login");
  window.location.href = "login.html";
}
</script>

</body>
</html>
