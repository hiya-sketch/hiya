<!DOCTYPE html>
<html>
<head>
<title>My Modern Site</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Navbar */
.navbar {
  background: #333;
  padding: 15px;
  color: white;
  text-align: center;
}

/* Hero Section */
.hero {
  height: 100vh;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.hero h1 {
  font-size: 40px;
}

.hero button {
  padding: 10px 20px;
  border: none;
  background: white;
  color: #333;
  cursor: pointer;
  border-radius: 5px;
}

/* Section */
.section {
  padding: 40px;
  text-align: center;
}

/* Card */
.card {
  display: inline-block;
  width: 200px;
  padding: 20px;
  margin: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  border-radius: 10px;
}
</style>

</head>

<body>

<div class="navbar">
  My Website 😄
</div>

<div class="hero">
  <h1>Welcome 🚀</h1>
  <p>My modern website</p>
  <button>Get Started</button>
</div>

<div class="section">
  <h2>Features</h2>

  <div class="card">Fast ⚡</div>
  <div class="card">Clean ✨</div>
  <div class="card">Simple 😄</div>
</div>

</body>
</html>
