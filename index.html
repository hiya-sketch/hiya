
<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #4facfe, #00f2fe);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 10px;
  background: #4facfe;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #007bff;
}

</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>
  
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  
  <button onclick="login()">Login</button>
</div>

<script>
function login(){
  alert("Login Successful 😄");
}
</script>

</body>
</html>
