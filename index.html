<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Navbar */
.navbar {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* Products */
.products {
  padding: 30px;
  text-align: center;
}

.card {
  display: inline-block;
  width: 200px;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.card button:hover {
  background: #333;
}
</style>

</head>

<body>

<div class="navbar">
  🛒 My Online Shop
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Product 1</h3>
    <p>$10</p>
    <button onclick="buy()">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Product 2</h3>
    <p>$20</p>
    <button onclick="buy()">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Product 3</h3>
    <p>$30</p>
    <button onclick="buy()">Buy</button>
  </div>

</div>

<script>
function buy(){
  alert("Item added to cart 😄");
}
</script>

</body>
</html>
