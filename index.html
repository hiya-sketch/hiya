<!DOCTYPE html>
<html>
<head>
<title>My Shop</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Navbar */
.navbar {
  background: black;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

.cart {
  cursor: pointer;
}

/* Products */
.products {
  padding: 20px;
  text-align: center;
}

.card {
  display: inline-block;
  width: 200px;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
}

button {
  padding: 8px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="navbar">
  <div>🛒 My Shop</div>
  <div class="cart">Cart: <span id="count">0</span></div>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Shirt</h3>
    <p>$10</p>
    <button onclick="add()">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Shoes</h3>
    <p>$20</p>
    <button onclick="add()">Add to Cart</button>
  </div>

</div>

<script>
let count = 0;

function add(){
  count++;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
